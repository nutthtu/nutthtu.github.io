<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f7fb"/>
      <stop offset="1" stop-color="#e9eaf0"/>
    </linearGradient>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#cc0033" stroke-width="1.4" stroke-opacity=".75"/>
    </pattern>
  </defs>
  <rect width="400" height="250" fill="url(#bgd)"/>

  <!-- Axis frame -->
  <g stroke="#1a1a1a" stroke-width="1.4" fill="none">
    <line x1="55" y1="210" x2="375" y2="210"/>
    <line x1="55" y1="210" x2="55"  y2="25"/>
  </g>

  <!-- Tick marks (unlabeled to keep generic) -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="55"  y1="210" x2="55"  y2="214"/>
    <line x1="135" y1="210" x2="135" y2="214"/>
    <line x1="215" y1="210" x2="215" y2="214"/>
    <line x1="295" y1="210" x2="295" y2="214"/>
    <line x1="375" y1="210" x2="375" y2="214"/>
    <line x1="51" y1="210" x2="55" y2="210"/>
    <line x1="51" y1="165" x2="55" y2="165"/>
    <line x1="51" y1="120" x2="55" y2="120"/>
    <line x1="51" y1="75"  x2="55" y2="75"/>
    <line x1="51" y1="30"  x2="55" y2="30"/>
  </g>

  <!-- Axis labels -->
  <g font-family="-apple-system, Inter, sans-serif" font-size="12" fill="#1a1a1a">
    <text x="215" y="234" text-anchor="middle" font-weight="600">at.% solute 1</text>
    <text x="36" y="120" text-anchor="middle" font-weight="600" transform="rotate(-90 36 120)">at.% solute 2</text>
  </g>

  <!--
    Contour curves drawn with quadratic Beziers chained through the 4 design-window corners,
    so the design-window border can re-use the SAME control points and overlay exactly along
    each contour segment.

    Corners:
      A (top-left)     = (165, 105)
      B (top-right)    = (265,  80)
      C (bottom-right) = (275, 130)
      D (bottom-left)  = (175, 155)
  -->

  <!-- Navy contours: iso-lines of (unnamed) property 1, slope up-right -->
  <g fill="none" stroke="#1a2a55" stroke-width="1.8">
    <!-- Navy_top: through A and B -->
    <path d="M 55 132 Q 110 118 165 105 Q 215 92 265 80 Q 320 66 375 52"/>
    <!-- Navy_bottom: through D and C (parallel) -->
    <path d="M 55 185 Q 115 170 175 155 Q 225 142 275 130 Q 325 117 375 105" stroke-opacity=".7"/>
  </g>

  <!-- Red contours: iso-lines of (unnamed) property 2, slope down-right -->
  <g fill="none" stroke="#cc0033" stroke-width="1.8">
    <!-- Red_left: through A and D -->
    <path d="M 149 25 Q 157 65 165 105 Q 170 130 175 155 Q 181 187 188 220"/>
    <!-- Red_right: through B and C (parallel) -->
    <path d="M 254 25 Q 260 52 265 80 Q 270 105 275 130 Q 284 175 293 220" stroke-opacity=".7"/>
  </g>

  <!--
    Design window: re-uses the SAME Bezier control points as the contour segments above.
      A→B along Navy_top:        Q 215 92  265 80
      B→C along Red_right:       Q 270 105 275 130
      C→D along Navy_bottom rev: Q 225 142 175 155
      D→A along Red_left rev:    Q 170 130 165 105
  -->
  <g>
    <path d="M 165 105
             Q 215 92  265 80
             Q 270 105 275 130
             Q 225 142 175 155
             Q 170 130 165 105 Z"
          fill="url(#hatch)" stroke="#cc0033" stroke-width="2"/>
    <text x="220" y="118" text-anchor="middle"
          font-family="-apple-system, Inter, sans-serif"
          font-size="12" font-weight="700" fill="#cc0033">DESIGN</text>
    <text x="220" y="132" text-anchor="middle"
          font-family="-apple-system, Inter, sans-serif"
          font-size="12" font-weight="700" fill="#cc0033">WINDOW</text>
  </g>
</svg>
