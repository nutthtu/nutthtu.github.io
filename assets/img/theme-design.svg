<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f7fb"/>
      <stop offset="1" stop-color="#e9eaf0"/>
    </linearGradient>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#cc0033" stroke-width="1.4" stroke-opacity=".75"/>
    </pattern>
  </defs>
  <rect width="340" height="250" fill="url(#bgd)"/>

  <!-- ============================================================
       LEFT PANEL — Olson systems-design chart (after Olson,
       Figs. 1-2): four columns Processing | Structure |
       Properties | Performance linked by a cross-column web.
       Boxes blank; only the column headers labelled.
       ============================================================ -->
  <g font-family="-apple-system, Inter, sans-serif">
    <g font-size="7.5" font-weight="700" fill="#1a2a55" text-anchor="middle">
      <text x="28"  y="85">Processing</text>
      <text x="72"  y="85">Structure</text>
      <text x="116" y="85">Properties</text>
      <text x="160" y="85">Performance</text>
    </g>

    <!-- cross-column linkage web -->
    <g stroke="#1a2a55" stroke-width="1" stroke-opacity=".45" fill="none">
      <path d="M43 100 L57 111"/><path d="M43 122 L57 111"/><path d="M43 122 L57 133"/>
      <path d="M43 144 L57 133"/><path d="M43 144 L57 155"/><path d="M43 166 L57 155"/>
      <path d="M87 111 L101 111"/><path d="M87 133 L101 111"/><path d="M87 133 L101 133"/>
      <path d="M87 133 L101 155"/><path d="M87 155 L101 155"/>
      <path d="M131 111 L145 111"/><path d="M131 133 L145 111"/><path d="M131 133 L145 133"/>
      <path d="M131 133 L145 155"/><path d="M131 155 L145 155"/>
    </g>

    <!-- Processing column -->
    <g fill="#fff" stroke="#1a2a55" stroke-width="1.3">
      <rect x="13" y="94"  width="30" height="13" rx="2.5"/>
      <rect x="13" y="116" width="30" height="13" rx="2.5"/>
      <rect x="13" y="138" width="30" height="13" rx="2.5"/>
      <rect x="13" y="160" width="30" height="13" rx="2.5"/>
    </g>
    <!-- top->bottom process sequence: down arrows (drawn on top, in the gaps) -->
    <g fill="#1a2a55" stroke="#1a2a55" stroke-width="1.3">
      <line x1="28" y1="107" x2="28" y2="110"/><polygon points="28,116 24.5,110 31.5,110" stroke="none"/>
      <line x1="28" y1="129" x2="28" y2="132"/><polygon points="28,138 24.5,132 31.5,132" stroke="none"/>
      <line x1="28" y1="151" x2="28" y2="154"/><polygon points="28,160 24.5,154 31.5,154" stroke="none"/>
    </g>

    <!-- Structure column -->
    <g fill="#fff" stroke="#1a2a55" stroke-width="1.3">
      <rect x="57" y="105" width="30" height="13" rx="2.5"/>
      <rect x="57" y="127" width="30" height="13" rx="2.5"/>
      <rect x="57" y="149" width="30" height="13" rx="2.5"/>
    </g>
    <!-- Properties column -->
    <g fill="#fff" stroke="#1a2a55" stroke-width="1.3">
      <rect x="101" y="105" width="30" height="13" rx="2.5"/>
      <rect x="101" y="127" width="30" height="13" rx="2.5"/>
      <rect x="101" y="149" width="30" height="13" rx="2.5"/>
    </g>
    <!-- Performance column -->
    <g fill="#fff" stroke="#1a2a55" stroke-width="1.3">
      <rect x="145" y="105" width="30" height="13" rx="2.5"/>
      <rect x="145" y="127" width="30" height="13" rx="2.5"/>
      <rect x="145" y="149" width="30" height="13" rx="2.5"/>
    </g>
  </g>

  <!-- ============================================================
       RIGHT PANEL — design-window contour plot.
       Two navy iso-lines (parallel) x two red iso-lines (parallel);
       the design window is the parallelogram at their intersection,
       its edges lying ALONG the contours.
       Corners  A(238,98) B(296,86) C(300,138) D(242,150).
       ============================================================ -->
  <g stroke="#1a1a1a" stroke-width="1.3" fill="none">
    <line x1="198" y1="188" x2="332" y2="188"/>
    <line x1="198" y1="188" x2="198" y2="54"/>
  </g>
  <g font-family="-apple-system, Inter, sans-serif" font-size="9" fill="#1a1a1a">
    <text x="265" y="204" text-anchor="middle" font-weight="600">Solute A [at.%]</text>
    <text x="188" y="121" text-anchor="middle" font-weight="600" transform="rotate(-90 188 121)">Solute B [at.%]</text>
  </g>

  <!-- Navy contours (parallel, gently curved): through A,B and D,C -->
  <g fill="none" stroke="#1a2a55" stroke-width="1.6">
    <path d="M 198 106 Q 218 102 238 98 Q 267 92 296 86 Q 313 83 330 80"/>
    <path d="M 202 158 Q 222 154 242 150 Q 271 144 300 138 Q 315 135 330 133" stroke-opacity=".7"/>
  </g>
  <!-- Red contours (parallel, gently curved): through A,D and B,C -->
  <g fill="none" stroke="#cc0033" stroke-width="1.6">
    <path d="M 236 54 Q 237 76 238 98 Q 240 124 242 150 Q 243 169 244 188"/>
    <path d="M 294 54 Q 295 70 296 86 Q 298 112 300 138 Q 301 163 302 188" stroke-opacity=".7"/>
  </g>

  <!-- Design window: edges re-use the contour control points (so they lie
       exactly on the iso-lines and are parallel to them) -->
  <g>
    <path d="M 238 98
             Q 267 92  296 86
             Q 298 112 300 138
             Q 271 144 242 150
             Q 240 124 238 98 Z"
          fill="url(#hatch)" stroke="#cc0033" stroke-width="2"/>
    <text x="269" y="114" text-anchor="middle"
          font-family="-apple-system, Inter, sans-serif"
          font-size="9.5" font-weight="700" fill="#cc0033">DESIGN</text>
    <text x="269" y="128" text-anchor="middle"
          font-family="-apple-system, Inter, sans-serif"
          font-size="9.5" font-weight="700" fill="#cc0033">WINDOW</text>
  </g>
</svg>
