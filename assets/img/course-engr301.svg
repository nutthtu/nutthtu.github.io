<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cc0033"/>
      <stop offset="1" stop-color="#7a001f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg7)"/>
  <!-- Three small panels: histogram + scatter + decision boundary -->
  <g transform="translate(30 50)">
    <!-- Panel 1: histogram -->
    <g transform="translate(0 0)">
      <rect width="100" height="200" fill="#fff" fill-opacity=".08" rx="4"/>
      <g fill="#fff">
        <rect x="10" y="160" width="10" height="30"/>
        <rect x="22" y="130" width="10" height="60"/>
        <rect x="34" y="80"  width="10" height="110"/>
        <rect x="46" y="60"  width="10" height="130"/>
        <rect x="58" y="90"  width="10" height="100"/>
        <rect x="70" y="120" width="10" height="70"/>
        <rect x="82" y="155" width="10" height="35"/>
      </g>
    </g>
    <!-- Panel 2: scatter -->
    <g transform="translate(120 0)">
      <rect width="100" height="200" fill="#fff" fill-opacity=".08" rx="4"/>
      <g fill="#fff" opacity=".9">
        <circle cx="20" cy="150" r="3"/><circle cx="35" cy="170" r="3"/>
        <circle cx="48" cy="160" r="3"/><circle cx="65" cy="135" r="3"/>
        <circle cx="78" cy="155" r="3"/>
        <circle cx="25" cy="60"  r="3"/><circle cx="40" cy="40"  r="3"/>
        <circle cx="55" cy="55"  r="3"/><circle cx="72" cy="70"  r="3"/>
        <circle cx="85" cy="45"  r="3"/>
      </g>
      <line x1="5" y1="120" x2="95" y2="80" stroke="#fff" stroke-width="1.6" stroke-dasharray="4 3"/>
    </g>
    <!-- Panel 3: decision boundary -->
    <g transform="translate(240 0)">
      <rect width="100" height="200" fill="#fff" fill-opacity=".08" rx="4"/>
      <path d="M 10 50 Q 50 100 90 80 L 90 190 L 10 190 Z" fill="#fff" fill-opacity=".22"/>
      <path d="M 10 50 Q 50 100 90 80" fill="none" stroke="#fff" stroke-width="1.8"/>
      <g fill="#fff">
        <circle cx="25" cy="30"  r="3"/><circle cx="50" cy="70" r="3"/>
        <circle cx="40" cy="160" r="3"/><circle cx="75" cy="140" r="3"/>
      </g>
    </g>
  </g>
  <g font-family="-apple-system, Inter, sans-serif" fill="#fff">
    <text x="200" y="32" text-anchor="middle" font-size="18" font-weight="700" font-style="italic" font-family="Source Serif Pro, Georgia, serif">Engineering Applications of Data Science</text>
    <text x="200" y="285" text-anchor="middle" font-size="11" opacity=".85">distributions · regression · classification</text>
  </g>
</svg>
