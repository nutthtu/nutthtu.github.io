<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2a55"/>
      <stop offset="1" stop-color="#0e1a3a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg6)"/>
  <!-- Scatter plot with regression line and shaded uncertainty -->
  <g transform="translate(50 40)">
    <g stroke="#9fb2e0" stroke-width="1" fill="none">
      <line x1="0" y1="210" x2="310" y2="210"/>
      <line x1="0" y1="0" x2="0" y2="210"/>
    </g>
    <!-- Shaded uncertainty band -->
    <path d="M 0 165 Q 100 110 200 75 Q 250 60 310 45
             L 310 75 Q 250 90 200 105 Q 100 135 0 195 Z"
          fill="#cc0033" fill-opacity=".22"/>
    <!-- Regression line -->
    <path d="M 0 180 Q 100 125 200 90 Q 250 75 310 60"
          fill="none" stroke="#cc0033" stroke-width="2.4"/>
    <!-- Data points -->
    <g fill="#fff" stroke="#cc0033" stroke-width="1.4">
      <circle cx="12"  cy="195" r="4"/>
      <circle cx="35"  cy="180" r="4"/>
      <circle cx="58"  cy="170" r="4"/>
      <circle cx="82"  cy="155" r="4"/>
      <circle cx="108" cy="130" r="4"/>
      <circle cx="135" cy="120" r="4"/>
      <circle cx="162" cy="108" r="4"/>
      <circle cx="190" cy="92"  r="4"/>
      <circle cx="220" cy="85"  r="4"/>
      <circle cx="250" cy="72"  r="4"/>
      <circle cx="278" cy="60"  r="4"/>
      <circle cx="300" cy="55"  r="4"/>
    </g>
  </g>
  <g font-family="-apple-system, Inter, sans-serif" fill="#fff">
    <text x="200" y="32" text-anchor="middle" font-size="18" font-weight="700" font-style="italic" font-family="Source Serif Pro, Georgia, serif">Data Science for CME</text>
    <text x="200" y="288" text-anchor="middle" font-size="11" opacity=".8">regression · uncertainty · ML for materials</text>
  </g>
</svg>
